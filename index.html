<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Панель управления ботом</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <div class="fixed-center">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Telegram Mini App SDK: без него window.Telegram.WebApp не существует,
       initData недоступна, и авто-логин/подтяжка данных в мини-аппе не работает -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Синхронизирует --tg-vh с реальной высотой WebView ДО первого рендера --
       фиксит "сжатие" интерфейса и лишние скроллы в мини-аппе. Должен идти
       после SDK и до main.js. -->
  <script src="js/telegram-viewport.js"></script>

  <!-- Config: точка входа для настройки адреса бэкенда, см. js/config.js -->
  <script src="js/config.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
